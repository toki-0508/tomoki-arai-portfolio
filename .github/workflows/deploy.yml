name: Deploy to GitHub Pages

# 本番は Vercel。GitHub Pages はサブ公開として同じ内容を配信する。
# Pages 向けビルドだけ base をサブパスへ切り替え、Contact は Vercel の API を叩く。

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages へのデプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行を1本に制限(進行中のデプロイはキャンセルしない)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          # base を '/tomoki-arai-portfolio/' に切り替える
          GITHUB_PAGES: 'true'
          # Pages は静的配信のため、問い合わせは Vercel 上の API へ転送する
          VITE_CONTACT_API_BASE: https://tomoki-arai.vercel.app
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
