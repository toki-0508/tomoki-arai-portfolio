  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="930" cy="250" r="190" fill="#ffffff" opacity=".72"/>
  <ellipse cx="914" cy="290" rx="240" ry="135" fill="none" stroke="#bfdbfe" stroke-width="2" stroke-dasharray="8 12"/>
  <ellipse cx="914" cy="290" rx="290" ry="165" fill="none" stroke="#dbeafe" stroke-width="2" stroke-dasharray="8 12"/>
  <g filter="url(#shadow)">
    <rect x="820" y="190" width="190" height="190" rx="42" fill="#ffffff" opacity=".78" stroke="#bfdbfe" stroke-width="4"/>
    <rect x="868" y="238" width="94" height="94" rx="24" fill="url(#blue)" opacity=".72"/>
  </g>
  <circle cx="1040" cy="165" r="16" fill="#2563eb" opacity=".82"/>
  <circle cx="760" cy="330" r="12" fill="#3b82f6" opacity=".78"/>
